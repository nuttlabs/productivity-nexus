<script>
// Static-site subscription handler. Replace the form action above with your Airtable webhook URL.
(function () {
  var form = document.getElementById('subscription-form');
  if (!form) return;
  var done = document.querySelector('.w-form-done');
  var fail = document.querySelector('.w-form-fail');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var data = new FormData(form);
    var payload = {};
    data.forEach(function (v, k) { payload[k] = v; });
    fetch(form.action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      var redirect = form.getAttribute('data-success-redirect');
      if (redirect) { window.location.href = redirect; return; }
      form.style.display = 'none';
      if (done) done.style.display = 'block';
    }).catch(function () {
      if (fail) fail.style.display = 'block';
    });
  });
})();
</script>
